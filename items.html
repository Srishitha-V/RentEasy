<!DOCTYPE html>
<html>
<head>
    <title>Available Items</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="items-page">

<a href="index.html" class="back-btn">← Back</a>

<h1 class="page-title">Available Items</h1>

<div class="items-container">

    <div class="item-card">
        <div class="image-container">
            <img src="images/calculator.png" alt="Scientific Calculator">
        </div>
        <h3>Scientific Calculator</h3>
        <p class="price">₹20 / day</p>
        <button onclick="bookItem('Scientific Calculator',40)">Book Now</button>
    </div>

    <div class="item-card">
        <div class="image-container">
            <img src="images/racket.png" alt="Badminton Racket">
        </div>
        <h3>Badminton Racket</h3>
        <p class="price">₹50 / day</p>
        <button onclick="bookItem('Badminton Racket',50)">Book Now</button>
    </div>

    <div class="item-card">
        <div class="image-container">
            <img src="images/shuttle.png" alt="Shuttle">
        </div>
        <h3>Shuttle</h3>
        <p class="price">₹20 / day</p>
        <button onclick="bookItem('Shuttle',20)">Book Now</button>
    </div>

    <div class="item-card">
        <div class="image-container">
            <img src="images/bat.png" alt="Cricket Bat & Ball">
        </div>
        <h3>Cricket Bat & Ball</h3>
        <p class="price">₹100 / day</p>
        <button onclick="bookItem('Cricket Bat & Ball',60)">Book Now</button>

    <div class="item-card">
        <div class="image-container">
            <img src="images/white_apron.png" alt="Lab Apron White">
        </div>
        <h3>Lab Apron (White)</h3>
        <p class="price">₹30 / day</p>
        <button onclick="bookItem('Lab Apron White',30)">Book Now</button>
    </div>

    <div class="item-card">
        <div class="image-container">
            <img src="images/khaki_apron.png" alt="Lab Apron Khaki">
        </div>
        <h3>Lab Apron (Khaki)</h3>
        <p class="price">₹30 / day</p>
        <button onclick="bookItem('Lab Apron Khaki',30)">Book Now</button>
    </div>

    <div class="item-card">
        <div class="image-container">
            <img src="images/drafter.png" alt="Drafter">
        </div>
        <h3>Drafter</h3>
        <p class="price">₹25 / day</p>
        <button onclick="bookItem('Drafter',35)">Book Now</button>
    </div>

</div>
