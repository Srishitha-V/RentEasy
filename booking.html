<!DOCTYPE html>
<html>
<head>
    <title>Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="booking-page">

<a href="items.html" class="back-btn">← Back</a>
<button class="logout-btn" onclick="logout()">Logout</button>

<div class="booking-box">

    <h2>Booking Details</h2>

    <div class="item-info">
        <p id="itemName"></p>
        <p id="itemPrice"></p>
    </div>

    <label for="customerName">Your Name</label>
    <input type="text" id="customerName" placeholder="Enter Your Name">

    <label for="bookingDate">Select Booking Date</label>
    <input type="date" id="bookingDate">

    <label for="days">Number of Days (Max 10 days)</label>
    <input type="number" id="days" placeholder="Enter number of days" min="1" max="10">

    <div id="timingsSection" style="display: none;">
        <label for="startTime">From Time</label>
        <input type="time" id="startTime">

        <label for="endTime">To Time</label>
        <input type="time" id="endTime">
    </div>

    <label for="paymentMethod">Payment Method</label>
    <select id="paymentMethod">
        <option value="">Select Payment Method</option>
        <option>UPI</option>
        <option>Credit Card</option>
        <option>Cash</option>
    </select>

    <button onclick="confirmBooking()">Confirm Booking</button>

    <p id="successMessage" class="success-message"></p>

</div>

<script src="script.js"></script>
<script>
    // Check login and hide/show logout button
    document.addEventListener("DOMContentLoaded", function() {
        const isLoggedIn = localStorage.getItem("isLoggedIn");
        const logoutBtn = document.querySelector(".logout-btn");
        
        if(!isLoggedIn){
            logoutBtn.style.display = "none";
            // Redirect to login if not logged in
            alert("Please login first to book an item!");
            window.location.href = "login.html";
        }
        
        // Also trigger toggleTimings on page load in case days is pre-filled
        const daysInput = document.getElementById("days");
        if(daysInput && daysInput.value > 3){
            document.getElementById("timingsSection").style.display = "block";
        }
    });
</script>
</body>
</html>
