<!DOCTYPE html>
<html>
<head>
    <title>Booking - RentEasy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Complete Booking</h1>
</header>

<div class="form-container">
    <h3 id="selectedItem"></h3>
    <input type="text" id="username" placeholder="Enter Your Name">
    <button onclick="placeOrder()">Confirm Booking</button>
</div>

<script src="script.js"></script>
<script>
document.getElementById("selectedItem").innerText =
"Item: " + localStorage.getItem("item") +
" | Price: ₹" + localStorage.getItem("price") + "/day";
</script>

</body>
</html>
