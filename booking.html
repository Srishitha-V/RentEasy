<!DOCTYPE html>
<html>
<head>
    <title>Booking - RentEasy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="center">Book Item</h1>

<form id="bookingForm" onsubmit="return confirmBooking()">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="roll" placeholder="Roll Number" required>
    <input type="text" id="item" readonly>
    <input type="number" id="days" placeholder="Number of Days" required>
    <input type="date" id="date" required>
    <button type="submit">Confirm Booking</button>
</form>

<script src="script.js"></script>
</body>
</html>
