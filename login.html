<!DOCTYPE html>
<html>
<head>
    <title>Login - RentEasy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="login-container">
    <div class="login-box">
        <h1>RentEasy</h1>
        <p class="subtitle">Student Login</p>
        
        <form id="loginForm" onsubmit="return validateLogin(event)">
            <div class="form-group">
                <label for="rollno">Student Roll No.</label>
                <input type="text" id="rollno" placeholder="Enter your roll number" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="login-btn">Login</button>
        </form>
        
        <p class="back-link"><a href="index.html">← Back to Home</a></p>
    </div>

<script src="script.js"></script>
</body>
</html>
